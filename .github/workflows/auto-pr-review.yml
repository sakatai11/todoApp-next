name: Auto PR Review Response (Claude)

# CodeRabbitがレビューを投稿したタイミングで自動起動
on:
  pull_request_review:
    types: [submitted]

# 同一PRで複数のレビューが届いても1つずつ順番に処理する
concurrency:
  group: auto-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write # ブランチへのcommit/push
  pull-requests: write # コメント投稿・スレッド解決

jobs:
  auto-response:
    name: Claude Auto Review Response
    runs-on: ubuntu-latest

    # CodeRabbit・Gemini Code Assistのレビューに反応（他のレビュアーは手動対応）
    if: |
      github.event.review.user.login == 'coderabbitai[bot]' ||
      github.event.review.user.login == 'gemini-code-assist[bot]'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # GITHUB_TOKENではpush権限が弱い場合があるのでデフォルトで試す
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install gh-pr-review extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install agynio/gh-pr-review

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # CodeRabbit・Gemini Code Assistが全コメントを投稿し終えるのを待つ
      - name: Wait for reviewer bot to finish posting all comments
        run: sleep 60

      - name: Load skill content
        id: skill
        run: |
          # SKILL.mdの内容を読み込んでGitHub Outputに格納
          SKILL_CONTENT=$(cat .claude/skills/pr-review-todoapp/SKILL.md)
          # 複数行の文字列をGitHub Outputに安全に渡す
          echo "content<<EOF_SKILL" >> $GITHUB_OUTPUT
          echo "$SKILL_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF_SKILL" >> $GITHUB_OUTPUT

      - name: Run Claude PR Review Workflow
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          # SKILL.mdの内容をファイル経由でプロンプトに渡す
          SKILL_CONTENT=$(cat .claude/skills/pr-review-todoapp/SKILL.md)

          claude --skip-permissions --non-interactive -p "
          ## 実行環境
          - GitHub Actions CI環境
          - PR番号: #${PR_NUMBER}
          - リポジトリ: ${REPO}
          - ブランチ: ${BRANCH}

          ## 実行するスキル仕様
          以下のスキル定義に従ってPRレビュー対応を実行してください。

          ${SKILL_CONTENT}

          ## 追加制約
          - コミットメッセージには必ず '[skip ci]' を含めること（ワークフロー無限ループ防止）
          - 形式例: 'fix: address PR review feedback [skip ci]'
          "
