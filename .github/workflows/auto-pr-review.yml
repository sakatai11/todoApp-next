name: Auto PR Review Response (Claude)

# CodeRabbit・Gemini Code Assistがレビューを投稿したタイミングで自動起動
on:
  # フォーマルなレビュー（APPROVED / CHANGES_REQUESTED）
  pull_request_review:
    types: [submitted]
  # コメント形式のレビュー（CodeRabbitはこちらを使用）
  issue_comment:
    types: [created]

# 同一PRで複数のレビューが届いても1つずつ順番に処理する
concurrency:
  group: auto-pr-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write # ブランチへのcommit/push
  pull-requests: write # コメント投稿・スレッド解決
  id-token: write # claude-code-action@v1 のOIDC認証に必要

jobs:
  auto-response:
    name: Claude Auto Review Response
    runs-on: ubuntu-latest

    # CodeRabbit・Gemini Code Assistのみに反応（他のレビュアーは手動対応）
    # issue_commentはPR上のコメントのみ対象（issue本体のコメントは除外）
    if: |
      (github.event_name == 'pull_request_review' && (
        github.event.review.user.login == 'coderabbitai[bot]' ||
        github.event.review.user.login == 'gemini-code-assist[bot]'
      )) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null && (
        github.event.comment.user.login == 'coderabbitai[bot]' ||
        github.event.comment.user.login == 'gemini-code-assist[bot]'
      ))

    steps:
      # issue_commentイベントではgithub.event.pull_requestが存在しないため
      # PRのhead refをGitHub APIで動的に取得する
      - name: Get PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            BRANCH=$(gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json headRefName -q .headRefName)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install gh-pr-review extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install agynio/gh-pr-review

      # CodeRabbit・Gemini Code Assistが全コメントを投稿し終えるのを待つ
      - name: Wait for reviewer bot to finish posting all comments
        run: sleep 60

      - name: Run Claude PR Review Workflow
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "coderabbitai[bot],gemini-code-assist[bot]"
          track_progress: true
          claude_args: "--skip-permissions"
          prompt: |
            ## 実行環境
            - GitHub Actions CI環境
            - PR番号: ${{ steps.pr_info.outputs.pr_number }}
            - リポジトリ: ${{ github.repository }}
            - ブランチ: ${{ steps.pr_info.outputs.branch }}

            ## タスク
            まず `.claude/skills/pr-review-todoapp/SKILL.md` を Read ツールで読み込んでください。
            読み込んだ手順に従い、PR #${{ steps.pr_info.outputs.pr_number }} へのレビュー対応を実行してください。

            SKILL.md内の `${PR_NUMBER}` は `${{ steps.pr_info.outputs.pr_number }}` に、
            `${REPO}` は `${{ github.repository }}` に置き換えて使用してください。

            ## 絶対制約
            - コミットメッセージには必ず '[skip ci]' を含めること（ワークフロー無限ループ防止）
            - 形式例: 'fix: address PR review feedback [skip ci]'
