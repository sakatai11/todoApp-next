name: Auto PR Review Response (Claude)

# CodeRabbitがレビューを投稿したタイミングで自動起動
on:
  pull_request_review:
    types: [submitted]
  # テスト用手動実行
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR番号（例: 95）'
        required: true
        type: string

# 同一PRで複数のレビューが届いても1つずつ順番に処理する
concurrency:
  group: auto-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write # ブランチへのcommit/push
  pull-requests: write # コメント投稿・スレッド解決

jobs:
  auto-response:
    name: Claude Auto Review Response
    runs-on: ubuntu-latest

    # CodeRabbit・Gemini Code Assistのレビューに反応（手動実行も許可）
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.review.user.login == 'coderabbitai[bot]' ||
      github.event.review.user.login == 'gemini-code-assist[bot]'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # GITHUB_TOKENではpush権限が弱い場合があるのでデフォルトで試す
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install gh-pr-review extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install agynio/gh-pr-review

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # CodeRabbit・Gemini Code Assistが全コメントを投稿し終えるのを待つ
      - name: Wait for reviewer bot to finish posting all comments
        run: sleep 60

      - name: Run Claude PR Review Workflow
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 手動実行時はinputsから、自動実行時はイベントから取得
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            BRANCH=$(gh pr view ${PR_NUMBER} --json headRefName -q .headRefName)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
          fi
          REPO="${{ github.repository }}"

          claude --skip-permissions --non-interactive -p "
          GitHub Actions CI環境で実行中。
          - PR番号: #${PR_NUMBER}
          - リポジトリ: ${REPO}
          - ブランチ: ${BRANCH}

          /pr-review-todoapp を実行してください。
          コミットメッセージには必ず '[skip ci]' を含めること。
          "
